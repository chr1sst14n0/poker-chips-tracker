.tl{font-size:13px;font-weight:700;text-transform:uppercase;color:#8B9CAF;margin-bottom:12px}
.spc{height:200px}
</style>
</head>

<script>
var sk=io(),S=null,mc='',mn='',sw={},bj={},ss={};
var GN={th:"Texas Hold'em",bj:'Blackjack',dr:'5 Card Draw'};
var PN={w:'Attesa',preflop:'Pre-Flop',flop:'Flop',turn:'Turn',river:'River',bet:'Puntata',play:'Gioco',res:'Risultati',bet1:'1° Puntate',swap:'Scambio',bet2:'2° Puntate',show:'Showdown'};
function $(i){return document.getElementById(i)}
function sh(i){var a=['H','J','L','G','E'];for(var x=0;x<a.length;x++)$(a[x]).classList.remove('on');$(i).classList.add('on')}
function ts(m){var t=document.createElement('div');t.className='ts';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2e3)}
function fm(n){return Number(n).toLocaleString('it')}
function se(i,m){$(i).innerHTML='<div class="eb">'+m+'</div>';setTimeout(function(){$(i).innerHTML=''},3e3)}

function bld(){if(!S)return;$('gg').textContent=GN[S.gt]||S.gt;$('gm').textContent=S.hn;$('gv').textContent=fm(S.pot);$('gph').textContent=PN[S.ph]||S.ph;$('hfl').style.display=S.host?'flex':'none';
if(S.host){var n=$('b8');if(S.gt==='th'){if(S.ph==='preflop'){n.textContent='Flop';n.style.display=''}else if(S.ph==='flop'){n.textContent='Turn';n.style.display=''}else if(S.ph==='turn'){n.textContent='River';n.style.display=''}else n.style.display='none'}else if(S.gt==='bj'){if(S.ph==='bet'){n.textContent='Avvia';n.style.display=''}else if(S.ph==='play'){n.textContent='Risultati';n.style.display=''}else n.style.display='none'}else{if(S.ph==='bet1'){n.textContent='Scambio';n.style.display=''}else if(S.ph==='swap'){n.textContent='2° Puntate';n.style.display=''}else if(S.ph==='bet2'){n.textContent='Showdown';n.style.display=''}else n.style.display='none'}}
